<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>
            {% block title %}Fast-Q App{% endblock %}
        </title>
        <link href="/static/output.css" rel="stylesheet">
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    </head>
    <body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
        <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm">
            <a href="/" class="text-xl font-extrabold text-blue-600 tracking-tight">Fast-Q</a>
            <div class="space-x-4 text-sm font-medium">
                <a href="/login" class="text-slate-600 hover:text-slate-900 transition">Log in</a>
                <a href="/register"
                   class="bg-slate-900 text-white px-4 py-2 rounded-lg hover:bg-slate-800 transition">Sign up</a>
            </div>
        </nav>
        <main class="flex-grow flex items-center justify-center p-6">
            {% block content %}{% endblock %}
        </main>
    </body>
</html>
