{% if not just_form_content %}
<dialog id="add-custom-slot-drawer" aria-labelledby="drawer-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-hidden bg-transparent backdrop:bg-transparent z-50">
  <div tabindex="0" class="absolute inset-0 pl-10 focus:outline-none sm:pl-16">
    <div class="ml-auto block size-full max-w-md transform transition duration-300 ease-out data-closed:translate-x-full bg-[var(--color-canvas)] border-l border-[var(--color-line)] shadow-xl">

      <form id="custom-slot-form"
            action="/my-calendar" method="POST"
            hx-post="/my-calendar" hx-target="#add-custom-slot-form-content" hx-swap="innerHTML"
            class="relative flex h-full flex-col">
        <div class="flex items-center justify-between px-5 py-4 border-b border-[var(--color-line)]">
          <h2 id="drawer-title" class="text-sm font-semibold text-[var(--color-ink)]">Add custom slot</h2>
          <button type="button" command="close" commandfor="add-custom-slot-drawer" class="btn btn-icon btn-ghost -mr-2">
            <span class="sr-only">Close panel</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="size-4">
              <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>

        <div id="add-custom-slot-form-content" class="flex-1 overflow-y-auto px-5 py-5">
{% endif %}

          {% if error_message %}
            <div class="mb-4 flex items-start gap-3 px-3 py-2.5 rounded-md border text-sm" style="border-color: var(--color-danger); background: var(--color-danger-soft); color: var(--color-danger);">
              {{ error_message|safe }}
            </div>
          {% endif %}

          <div class="space-y-4">
            <div>
              <label for="hospital_name" class="label">Hospital</label>
              <input type="text" name="hospital_name" id="hospital_name" value="{{ hospital_name if hospital_name else '' }}" required class="input">
            </div>

            <div>
              <label for="physician" class="label">Physician</label>
              <input type="text" name="physician" id="physician" value="{{ master_slot.physician if master_slot else '' }}" required class="input">
            </div>

            <div>
              <label for="specialty" class="label">Specialty</label>
              <input type="text" name="specialty" id="specialty" value="{{ master_slot.specialty if master_slot else '' }}" class="input">
            </div>

            <div>
              <label for="date" class="label">Date</label>
              <input type="date" name="date" id="date" value="{{ selected_date if selected_date else '' }}" required class="input tabular">
            </div>

            <div>
              <label for="time_block" class="label">Time block</label>
              {% set current_time_block = time_block_override if time_block_override else (master_slot.time_block if master_slot else '') %}
              <select id="time_block" name="time_block" class="input">
                <option value="AM" {% if current_time_block == 'AM' %}selected{% endif %}>AM</option>
                <option value="PM" {% if current_time_block == 'PM' %}selected{% endif %}>PM</option>
                <option value="AM/PM" {% if current_time_block == 'AM/PM' %}selected{% endif %}>AM/PM</option>
              </select>
            </div>

            <div>
              <label for="contact_email" class="label">Contact email</label>
              <input type="email" name="contact_email" id="contact_email" value="{{ master_slot.contact_email if master_slot else '' }}" required class="input">
            </div>

            <div>
              <label for="status" class="label">Status</label>
              <select id="status" name="status" class="input">
                <option value="To Contact">To Contact</option>
                <option value="Emailed">Emailed</option>
                <option value="Confirmed">Confirmed</option>
              </select>
            </div>

            <div>
              <label for="notes" class="label">Notes</label>
              <textarea id="notes" name="notes" rows="3" class="input"></textarea>
            </div>
          </div>

{% if not just_form_content %}
        </div>

        <div class="flex shrink-0 justify-end gap-2 px-5 py-3 border-t border-[var(--color-line)]">
          <button type="button" command="close" commandfor="add-custom-slot-drawer" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</dialog>

<script>
document.body.addEventListener("slotCreated", () => {
  const drawer = document.getElementById("add-custom-slot-drawer");
  if (drawer) {
    const closeBtn = drawer.querySelector('[command="close"]');
    if (closeBtn) closeBtn.click();
  }

  htmx.ajax('GET', '/my-calendar', {
    target: '#calendar-container',
    swap: 'innerHTML'
  });

  const toast = document.createElement("div");
  toast.className = "fixed bottom-4 right-4 px-3 py-2 rounded-md shadow-lg z-50 text-sm font-medium transition-opacity duration-500";
  toast.style.background = "var(--color-success)";
  toast.style.color = "white";
  toast.innerText = "Slot created";
  document.body.appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 500);
  }, 2500);
});
</script>
{% endif %}
