<el-dialog>
  <dialog id="add-custom-slot-drawer" aria-labelledby="drawer-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-hidden bg-transparent backdrop:bg-transparent z-50">
    <div tabindex="0" class="absolute inset-0 pl-10 focus:outline-none sm:pl-16">
      <el-dialog-panel class="ml-auto block size-full max-w-md transform transition duration-500 ease-in-out data-closed:translate-x-full sm:duration-700">
        <form hx-post="/my-calendar/custom-slot" hx-target="#add-custom-slot-form-content" hx-swap="innerHTML" class="relative flex h-full flex-col divide-y divide-gray-200 bg-white dark:bg-gray-900 dark:divide-white/10 shadow-xl">
          <div class="flex min-h-0 flex-1 flex-col overflow-y-auto py-6">
            <div class="px-4 sm:px-6">
              <div class="flex items-start justify-between">
                <h2 id="drawer-title" class="text-base font-semibold text-gray-900 dark:text-white">Add Custom Slot</h2>
                <div class="ml-3 flex h-7 items-center">
                  <button type="button" command="close" commandfor="add-custom-slot-drawer" class="relative rounded-md text-gray-400 hover:text-gray-500 dark:hover:text-gray-300 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">
                    <span class="absolute -inset-2.5"></span>
                    <span class="sr-only">Close panel</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" class="size-6">
                      <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
            <div id="add-custom-slot-form-content" class="relative mt-6 flex-1 px-4 sm:px-6">
              <div class="space-y-6">
                <div>
                  <label for="custom_title" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Title</label>
                  <div class="mt-2">
                    <input type="text" name="custom_title" id="custom_title" required class="block w-full rounded-md bg-white dark:bg-white/5 px-3 py-1.5 text-base text-gray-900 dark:text-white outline-1 -outline-offset-1 outline-gray-300 dark:outline-white/10 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6">
                  </div>
                </div>

                <div>
                  <label for="custom_location" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Location</label>
                  <div class="mt-2">
                    <input type="text" name="custom_location" id="custom_location" class="block w-full rounded-md bg-white dark:bg-white/5 px-3 py-1.5 text-base text-gray-900 dark:text-white outline-1 -outline-offset-1 outline-gray-300 dark:outline-white/10 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6">
                  </div>
                </div>

                <div>
                  <label for="date" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Date</label>
                  <div class="mt-2">
                    <input type="date" name="date" id="date" required class="block w-full rounded-md bg-white dark:bg-white/5 px-3 py-1.5 text-base text-gray-900 dark:text-white outline-1 -outline-offset-1 outline-gray-300 dark:outline-white/10 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6">
                  </div>
                </div>

                <div>
                  <label for="status" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Status</label>
                  <div class="mt-2 grid grid-cols-1">
                    <select id="status" name="status" class="col-start-1 row-start-1 w-full appearance-none rounded-md bg-white dark:bg-white/5 py-1.5 pr-8 pl-3 text-base text-gray-900 dark:text-white outline-1 -outline-offset-1 outline-gray-300 dark:outline-white/10 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6">
                      <option value="To Contact">To Contact</option>
                      <option value="Emailed">Emailed</option>
                      <option value="Confirmed">Confirmed</option>
                    </select>
                    <svg class="pointer-events-none col-start-1 row-start-1 mr-2 size-5 self-center justify-self-end text-gray-500 sm:size-4" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                      <path fill-rule="evenodd" d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z" clip-rule="evenodd" />
                    </svg>
                  </div>
                </div>

                <div>
                  <label for="notes" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Notes</label>
                  <div class="mt-2">
                    <textarea id="notes" name="notes" rows="3" class="block w-full rounded-md bg-white dark:bg-white/5 px-3 py-1.5 text-base text-gray-900 dark:text-white outline-1 -outline-offset-1 outline-gray-300 dark:outline-white/10 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6"></textarea>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="flex shrink-0 justify-end px-4 py-4 dark:bg-gray-900">
            <button type="button" command="close" commandfor="add-custom-slot-drawer" class="rounded-md bg-white dark:bg-white/10 px-3 py-2 text-sm font-semibold text-gray-900 dark:text-white shadow-xs inset-ring inset-ring-gray-300 dark:inset-ring-white/10 hover:bg-gray-50 dark:hover:bg-white/20">Cancel</button>
            <button type="submit" class="ml-4 inline-flex justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600">Save</button>
          </div>
        </form>
      </el-dialog-panel>
    </div>
  </dialog>
</el-dialog>
