<div class="max-w-3xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
  <div class="mb-8">
    <h2 class="text-2xl font-bold leading-7 text-gray-900 dark:text-white sm:truncate sm:text-3xl sm:tracking-tight">
      {% if master_slot_id %}Book Shift{% else %}Add Custom Slot{% endif %}
    </h2>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
      Fill in the details below to add this shift to your personal calendar.
    </p>
  </div>

  <form id="custom-slot-form" action="/my-calendar" method="POST" hx-post="/my-calendar" hx-target="#main-content" hx-push-url="true" class="bg-white dark:bg-gray-800 shadow-sm ring-1 ring-gray-900/5 dark:ring-white/10 sm:rounded-xl">
    
    {% if error_message %}
      <div class="p-4 bg-red-50 text-red-700 text-sm rounded-t-xl border-b border-red-200">
        {{ error_message|safe }}
      </div>
    {% endif %}

    <div class="px-4 py-6 sm:p-8">
      <div class="grid max-w-2xl grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">

        <div class="sm:col-span-3">
          <label for="hospital_name" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Hospital</label>
          <div class="mt-2">
            <input type="text" name="hospital_name" id="hospital_name" value="{{ hospital_name if hospital_name else '' }}" required class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10">
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="physician" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Physician</label>
          <div class="mt-2">
            <input type="text" name="physician" id="physician" value="{{ master_slot.physician if master_slot else '' }}" required class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10">
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="specialty" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Specialty</label>
          <div class="mt-2">
            <input type="text" name="specialty" id="specialty" value="{{ master_slot.specialty if master_slot else '' }}" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10">
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="contact_email" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Contact Email</label>
          <div class="mt-2">
            <input type="email" name="contact_email" id="contact_email" value="{{ master_slot.contact_email if master_slot else '' }}" required class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10">
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="date" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Date</label>
          <div class="mt-2">
            <input type="date" name="date" id="date" value="{{ selected_date if selected_date else '' }}" required class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10">
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="time_block" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Time Block</label>
          <div class="mt-2">
            <input type="text" name="time_block" id="time_block" value="{{ time_block_override if time_block_override else (master_slot.time_block if master_slot else '') }}" required class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10">
          </div>
        </div>

        <div class="sm:col-span-3">
          <label for="status" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Status</label>
          <div class="mt-2">
            <select id="status" name="status" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10">
              <option value="To Contact">To Contact</option>
              <option value="Emailed">Emailed</option>
              <option value="Confirmed">Confirmed</option>
            </select>
          </div>
        </div>

        <div class="col-span-full">
          <label for="notes" class="block text-sm font-medium leading-6 text-gray-900 dark:text-white">Notes</label>
          <div class="mt-2">
            <textarea id="notes" name="notes" rows="3" class="block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6 dark:bg-white/5 dark:text-white dark:ring-white/10"></textarea>
          </div>
          <p class="mt-3 text-sm leading-6 text-gray-500 dark:text-gray-400">Write any personal notes regarding this shift.</p>
        </div>

      </div>
    </div>
    
    <div class="flex items-center justify-end gap-x-6 border-t border-gray-900/10 dark:border-white/10 px-4 py-4 sm:px-8 bg-gray-50 dark:bg-gray-900/50 rounded-b-xl">
      <button type="button" onclick="history.back()" class="text-sm font-semibold leading-6 text-gray-900 dark:text-white hover:text-gray-700 dark:hover:text-gray-300 cursor-pointer">Cancel</button>
      <button type="submit" class="rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 cursor-pointer">Save Shift</button>
    </div>
  </form>
</div>
