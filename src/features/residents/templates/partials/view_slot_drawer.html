<dialog id="view-slot-drawer" open class="fixed inset-0 size-auto max-h-none max-w-none overflow-hidden bg-transparent backdrop:bg-transparent z-50">
  <div class="fixed inset-0 bg-black/40 transition-opacity" aria-hidden="true"></div>

  <div tabindex="0" class="absolute inset-0 pl-10 focus:outline-none sm:pl-16">
    <div class="ml-auto block size-full max-w-md transform bg-[var(--color-canvas)] border-l border-[var(--color-line)] shadow-xl">

      <div class="flex h-full flex-col">
        <div class="px-5 py-4 border-b border-[var(--color-line)] flex items-center justify-between">
          <h2 class="text-sm font-semibold text-[var(--color-ink)]">Slot details</h2>
          <button type="button" onclick="closeViewDrawer()" class="btn btn-icon btn-ghost -mr-2">
            <span class="sr-only">Close panel</span>
            <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
            </svg>
          </button>
        </div>

        <div class="flex-1 overflow-y-auto px-5 py-5">
          <dl class="space-y-5">
            <div>
              <dt class="section-title">Physician</dt>
              <dd class="mt-1 text-sm text-[var(--color-ink)]">{{ slot.physician }}</dd>
            </div>
            <div>
              <dt class="section-title">Hospital</dt>
              <dd class="mt-1 text-sm text-[var(--color-ink)]">{{ slot.hospital_name }}</dd>
            </div>
            <div>
              <dt class="section-title">Date &amp; time</dt>
              <dd class="mt-1 text-sm font-mono tabular text-[var(--color-ink)]">{{ slot.date }} &middot; {{ slot.time_block }}</dd>
            </div>
            <div>
              <dt class="section-title">Status</dt>
              <dd class="mt-1.5">
                <span class="badge badge-accent">{{ slot.status }}</span>
              </dd>
            </div>
            {% if slot.notes %}
            <div>
              <dt class="section-title">Notes</dt>
              <dd class="mt-2">
                <div class="surface rounded-md px-3 py-2.5 text-sm whitespace-pre-wrap leading-relaxed" style="color: var(--color-muted);">{{ slot.notes }}</div>
              </dd>
            </div>
            {% endif %}
          </dl>
        </div>

        <div class="flex shrink-0 justify-between gap-2 px-5 py-3 border-t border-[var(--color-line)]">
          <button type="button"
                  hx-delete="/my-calendar/slots/{{ slot.id }}"
                  hx-confirm="Delete this slot? This cannot be undone."
                  hx-target="#calendar-container" hx-select="#calendar-container" hx-swap="outerHTML"
                  class="btn btn-danger">
            Delete slot
          </button>
          <button type="button" onclick="closeViewDrawer()" class="btn btn-secondary">Close</button>
        </div>
      </div>
    </div>
  </div>
</dialog>

<script>
  function closeViewDrawer() {
    const container = document.getElementById('view-slot-drawer-container');
    if (container) container.innerHTML = '';
  }
  document.body.addEventListener("slotDeleted", () => closeViewDrawer());
</script>
