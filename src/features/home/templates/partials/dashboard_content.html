<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="sm:flex sm:items-center">
        <div class="sm:flex-auto">
            <h1 class="text-2xl font-bold leading-6 text-gray-900 dark:text-white">Hospitals Dashboard</h1>
            <p class="mt-2 text-sm text-gray-700 dark:text-gray-400">Select a hospital to view its master schedule, or create a new hospital below.</p>
        </div>
    </div>

    <!-- Hospital Cards Grid -->
    <div class="mt-8 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
        {% for hospital in hospitals %}
            <!-- Hospital Card -->
            <a href="/hospitals/{{ hospital.short_name }}"
               hx-get="/hospitals/{{ hospital.short_name }}" 
               hx-target="#main-content" 
               hx-swap="innerHTML transition:true" 
               hx-push-url="true"
               class="relative flex flex-col items-center justify-center p-8 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-white/10 hover:shadow-lg hover:border-indigo-500 dark:hover:border-indigo-400 transition-all duration-200 group">
                
                <div class="flex items-center justify-center size-16 rounded-full bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 mb-4 group-hover:scale-110 transition-transform duration-200">
                    <svg class="size-8" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z" />
                    </svg>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white text-center">{{ hospital.name }}</h3>
                <p class="mt-1 text-sm text-gray-500 dark:text-gray-400 text-center">View Master Schedule</p>
                <div class="absolute inset-0 rounded-2xl ring-2 ring-transparent group-hover:ring-indigo-600 transition-all duration-200" aria-hidden="true"></div>
            </a>
        {% endfor %}
    </div>

    <!-- Create New Hospital Section -->
    <div class="mt-12 bg-white dark:bg-gray-800 shadow-sm border border-gray-200 dark:border-white/10 rounded-2xl overflow-hidden">
        <div class="px-4 py-5 sm:p-6">
            <h3 class="text-base font-semibold leading-6 text-gray-900 dark:text-white">Create a New Hospital</h3>
            <div class="mt-2 max-w-xl text-sm text-gray-500 dark:text-gray-400">
                <p>Add a new hospital to start managing its shifts and schedules.</p>
            </div>
            <form hx-post="/hospitals/new" 
                  hx-target="#main-content" 
                  hx-swap="innerHTML transition:true" 
                  class="mt-5 space-y-4 sm:flex sm:items-center sm:space-y-0">
                <div class="w-full sm:max-w-xs">
                    <label for="hospital-name" class="sr-only">Hospital Name</label>
                    <input type="text" name="name" id="hospital-name" 
                           class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white dark:bg-white/5 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-white/10 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" 
                           placeholder="Full Name (e.g. Royal Victoria)" required>
                </div>
                <div class="w-full sm:max-w-xs sm:ml-3">
                    <label for="hospital-short-name" class="sr-only">Short Name</label>
                    <input type="text" name="short_name" id="hospital-short-name" 
                           class="block w-full rounded-md border-0 py-1.5 text-gray-900 dark:text-white dark:bg-white/5 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-white/10 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6" 
                           placeholder="Short Name (e.g. rvh)" required>
                </div>
                <button type="submit" 
                        class="mt-3 inline-flex w-full items-center justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 sm:ml-3 sm:mt-0 sm:w-auto">
                    Create Hospital
                </button>
            </form>
        </div>
    </div>
</div>
