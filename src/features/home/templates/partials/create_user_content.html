<div class="max-w-2xl mx-auto">
  <header class="mb-8">
    <h1 class="text-xl font-semibold tracking-tight text-[var(--color-ink)]">Create user</h1>
    <p class="mt-1 text-sm" style="color: var(--color-muted);">Register a new resident or administrator on the platform.</p>
  </header>

  {% if error_message %}
  <div class="mb-5 flex items-start gap-3 px-4 py-3 rounded-md border" style="border-color: var(--color-danger); background: var(--color-danger-soft); color: var(--color-danger);">
    <svg class="size-4 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"/>
    </svg>
    <span class="text-sm font-medium">{{ error_message }}</span>
  </div>
  {% endif %}

  <form id="create-user-form"
        action="/admin/users/new" method="POST"
        hx-post="/admin/users/new"
        hx-target="#main-content"
        hx-push-url="true"
        class="card overflow-hidden">

    <div class="p-5 grid grid-cols-1 sm:grid-cols-2 gap-x-5 gap-y-4">

      <div>
        <label for="full_name" class="label">Full name</label>
        <input type="text" name="full_name" id="full_name" value="{{ full_name or '' }}" placeholder="Dr. Jane Smith" class="input">
      </div>

      <div>
        <label for="email" class="label">Email address</label>
        <input type="email" name="email" id="email" required value="{{ email or '' }}" placeholder="user@hospital.com" class="input">
      </div>

      <div>
        <label for="password" class="label">Password</label>
        <input type="password" name="password" id="password" required placeholder="Min. 8 characters" class="input">
      </div>

      <div>
        <label for="confirm_password" class="label">Confirm password</label>
        <input type="password" name="confirm_password" id="confirm_password" required placeholder="Re-enter password" class="input">
      </div>

      <div class="sm:col-span-2">
        <label class="label">Role</label>
        <div class="grid grid-cols-2 gap-3">
          <label class="flex items-center gap-3 px-3 py-3 rounded-md border border-[var(--color-line-strong)] cursor-pointer transition-colors hover:bg-[var(--color-surface-hover)] has-[:checked]:border-[var(--color-accent)] has-[:checked]:bg-[var(--color-accent-soft)]">
            <input type="radio" name="role" value="resident" class="sr-only" checked>
            <div class="flex-1">
              <p class="text-sm font-medium text-[var(--color-ink)]">Resident</p>
              <p class="text-xs mt-0.5" style="color: var(--color-muted);">Can view and book shifts</p>
            </div>
          </label>

          <label class="flex items-center gap-3 px-3 py-3 rounded-md border border-[var(--color-line-strong)] cursor-pointer transition-colors hover:bg-[var(--color-surface-hover)] has-[:checked]:border-[var(--color-accent)] has-[:checked]:bg-[var(--color-accent-soft)]">
            <input type="radio" name="role" value="admin" class="sr-only">
            <div class="flex-1">
              <p class="text-sm font-medium text-[var(--color-ink)]">Admin</p>
              <p class="text-xs mt-0.5" style="color: var(--color-muted);">Full platform access</p>
            </div>
          </label>
        </div>
      </div>
    </div>

    <div class="px-5 py-3 border-t border-[var(--color-line)] flex items-center justify-end gap-2">
      <a href="/admin/users"
         hx-get="/admin/users" hx-target="#main-content"
         hx-swap="innerHTML transition:true" hx-push-url="true"
         class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">
        <svg class="size-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/>
        </svg>
        Create user
      </button>
    </div>
  </form>
</div>
