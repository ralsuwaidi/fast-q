{% extends "base.html" %}

{% block title %}Create Account - Fast-Q{% endblock %}
{% block content %}
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl border border-slate-100 p-8">
        <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-slate-900">Create an Account</h1>
            <p class="text-sm text-slate-500 mt-2">Join the platform today.</p>
        </div>
        <div id="form-message" class="mb-4"></div>
        <form hx-post="/register"
              hx-target="#form-message"
              hx-swap="innerHTML"
              class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email"
                       name="email"
                       required
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password"
                       name="password"
                       required
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg">
                Create Account
            </button>
        </form>
    </div>
{% endblock %}
