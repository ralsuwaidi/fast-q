{% extends "auth_base.html" %}

{% block title %}Create Account | ShiftSync{% endblock %}

{% block content %}
<div class="flex min-h-full flex-col justify-center px-6 py-12">
  <div class="w-full max-w-sm mx-auto">
    <div class="flex flex-col items-center gap-3 mb-8">
      <span class="inline-flex size-9 items-center justify-center rounded-md bg-[var(--color-accent)] text-white text-sm font-bold tracking-tight">SS</span>
      <h1 class="text-lg font-semibold tracking-tight text-[var(--color-ink)]">Create your account</h1>
      <p class="text-sm" style="color: var(--color-muted);">Get started with ShiftSync in under a minute.</p>
    </div>

    <div class="card p-6">
      <form hx-post="/register" hx-target="#form-message" hx-swap="innerHTML" class="space-y-4">

        <div>
          <label for="full_name" class="label">Full name</label>
          <input id="full_name" type="text" name="full_name" autocomplete="name" class="input" placeholder="Jane Doe" />
        </div>

        <div>
          <label for="email" class="label">Email address</label>
          <input id="email" type="email" name="email" required autocomplete="email" class="input" placeholder="you@hospital.org" />
        </div>

        <div>
          <label for="password" class="label">Password</label>
          <input id="password" type="password" name="password" required autocomplete="new-password" class="input" placeholder="••••••••" />
        </div>

        <div id="form-message" class="text-xs font-medium text-center" style="color: var(--color-danger);"></div>

        <button type="submit" class="btn btn-primary w-full">Create account</button>
      </form>
    </div>

    <p class="mt-6 text-center text-xs" style="color: var(--color-muted);">
      Already have an account?
      <a href="/login" class="font-medium" style="color: var(--color-accent);">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
