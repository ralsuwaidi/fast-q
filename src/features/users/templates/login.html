{% extends "auth_base.html" %}

{% block content %}
<div class="flex min-h-full flex-col justify-center px-6 py-12">
  <div class="w-full max-w-sm mx-auto">
    <div class="flex flex-col items-center gap-3 mb-8">
      <span class="inline-flex size-9 items-center justify-center rounded-md bg-[var(--color-accent)] text-white text-sm font-bold tracking-tight">SS</span>
      <h1 class="text-lg font-semibold tracking-tight text-[var(--color-ink)]">Sign in to ShiftSync</h1>
      <p class="text-sm" style="color: var(--color-muted);">Welcome back. Enter your details to continue.</p>
    </div>

    <div class="card p-6">
      <form hx-post="/login" hx-target="#auth-error" hx-swap="innerHTML" class="space-y-4">

        <div>
          <label for="email" class="label">Email address</label>
          <input id="email" type="email" name="email" required autocomplete="email" class="input" placeholder="you@hospital.org" />
        </div>

        <div>
          <div class="flex items-center justify-between mb-1.5">
            <label for="password" class="label mb-0">Password</label>
            <a href="#" class="text-xs font-medium transition-colors" style="color: var(--color-accent);">Forgot?</a>
          </div>
          <input id="password" type="password" name="password" required autocomplete="current-password" class="input" placeholder="••••••••" />
        </div>

        <div id="auth-error" class="text-xs font-medium text-center" style="color: var(--color-danger);"></div>

        <button type="submit" class="btn btn-primary w-full">Sign in</button>
      </form>
    </div>

    <p class="mt-6 text-center text-xs" style="color: var(--color-muted);">
      Don't have an account?
      <a href="/register" class="font-medium" style="color: var(--color-accent);">Create one</a>
    </p>
  </div>
</div>
{% endblock %}
